# Perfil PROD — solo migraciones versionadas, sin seed de desarrollo
spring.flyway.locations=classpath:db/migration
spring.jpa.show-sql=false

# URL base para construcción dinámica de URLs de medias
# Sobreescribir con variable de entorno BASE_URL en el servidor de producción
app.base-url=${BASE_URL:https://dpa.umss.net}
app.use-relative-urls=false
