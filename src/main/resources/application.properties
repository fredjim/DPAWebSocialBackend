spring.application.name=socialpagebackend

server.port=9091
server.error.include-stacktrace=ON_PARAM

spring.datasource.username=${pgUser}
spring.datasource.password=${pgPassword}
spring.datasource.url=${bdd}
#spring.datasource.username=dev
#spring.datasource.password=12345678
#spring.datasource.url=jdbc:postgresql://localhost:5432/websocial_dpa

spring.jpa.hibernate.ddl-auto=none
spring.sql.init.platform=dpa_dev

# Flyway — migraciones automáticas de BD
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Perfil activo (cambiar a 'prod' en producción)
spring.profiles.active=${SPRING_PROFILE:dev}

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.datasource.hikari.connection-init-sql=SET TIME ZONE 'UTC'

spring.sql.init.mode=never

spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB
spring.servlet.multipart.enabled=true
server.tomcat.max-swallow-size=1GB
server.tomcat.max-http-form-post-size=1GB
server.tomcat.max-http-post-size=1GB

security.jwt.expiration-time=10800000

# File Storage Configuration
file.storage.document-upload-dir=${user.dir}/storage/institution/posts/documents/
file.storage.image-upload-dir=${user.dir}/storage/institution/posts/photos/
file.storage.video-upload-dir=${user.dir}/storage/institution/posts/videos/
file.storage.user-profile-upload-dir=${user.dir}/storage/users/photos/
file.storage.max-file-size=52428800
file.storage.max-request-size=104857600
file.storage.allowed-document-types=application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
file.storage.allowed-image-types=image/jpeg,image/png,image/gif,image/webp
file.storage.allowed-video-types=video/mp4,video/avi,video/mov,video/wmv

# Application URL Configuration (Environment Specific)
app.base-url=${BASE_URL:http://localhost:9091}
app.use-relative-urls=${USE_RELATIVE_URLS:false}
app.api.base-path=${API_BASE_PATH:/api/v1}
app.api.documents-path=${API_DOCUMENTS_PATH:/documents}
app.api.images-path=${API_IMAGES_PATH:/images}
app.api.videos-path=${API_VIDEOS_PATH:/videos}
security.jwt.refresh-expiration-time=259200000

logging.level.org.zalando.logbook.Logbook=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR

logbook.masking.enabled=true
logbook.obfuscate.headers=Authorization
logbook.obfuscate.parameters=password
logbook.obfuscate.body.patterns='"password": ".*"'
logbook.format.style=http
logbook.filter.enabled=true

logging.file=/logs/websocial.log

#format log file
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

# ─────────────────────────────────────────────
# Moderation Pipeline Configuration
# ─────────────────────────────────────────────

# Filtro 1 - Blacklist
moderation.blacklist.enabled=true

# Filtro 2 - Perspective API (Google)
# Obtener API key en: https://developers.perspectiveapi.com/
moderation.perspective.enabled=false
moderation.perspective.api-key=${PERSPECTIVE_API_KEY:}
moderation.perspective.url=https://commentanalyzer.googleapis.com/v1alpha1/comments:analyze
moderation.perspective.toxicity-threshold=0.7
moderation.perspective.timeout-ms=5000
moderation.perspective.min-text-length=3

# Filtro 3 - LLM (compatible con cualquier proveedor OpenAI-compatible)
# Para cambiar de proveedor: solo cambia estas 3 variables de entorno
#
#   Ollama local:  LLM_ENDPOINT=http://localhost:11434/v1  LLM_MODEL=llama3.2       LLM_API_KEY=(vacío)
#   DeepSeek:      LLM_ENDPOINT=https://api.deepseek.com/v1  LLM_MODEL=deepseek-chat  LLM_API_KEY=sk-xxx
#   OpenAI:        LLM_ENDPOINT=https://api.openai.com/v1    LLM_MODEL=gpt-4o-mini    LLM_API_KEY=sk-xxx
#   Groq:          LLM_ENDPOINT=https://api.groq.com/openai/v1  LLM_MODEL=llama-3.3-70b-versatile
moderation.llm.enabled=false
moderation.llm.endpoint=${LLM_ENDPOINT:http://localhost:11434/v1}
moderation.llm.api-key=${LLM_API_KEY:}
moderation.llm.model=${LLM_MODEL:llama3.2}
moderation.llm.provider-name=${LLM_PROVIDER_NAME:ollama-local}
moderation.llm.confidence-threshold=0.8
moderation.llm.max-tokens=256
moderation.llm.temperature=0.1
moderation.llm.timeout-ms=15000

