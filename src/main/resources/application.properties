spring.application.name=socialpagebackend

server.port=9090
server.error.include-stacktrace=ON_PARAM

spring.datasource.username=${pgUser}
spring.datasource.password=${pgPassword}
spring.datasource.url=${bdd}

spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.platform=dric_dev

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.servlet.multipart.max-file-size=128MB
spring.servlet.multipart.max-request-size=128MB
spring.servlet.multipart.enabled=true

security.jwt.expiration-time=1800000

logging.level.org.zalando.logbook.Logbook=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR

logbook.masking.enabled=true
logbook.obfuscate.headers=Authorization
logbook.obfuscate.parameters=password
logbook.obfuscate.body.patterns='"password": ".*"'
logbook.format.style=http
logbook.filter.enabled=true



logging.file=/logs/websocial.log

# Patr�n para logs de archivos
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n