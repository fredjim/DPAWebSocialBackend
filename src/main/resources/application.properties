spring.application.name=socialpagebackend

server.port=9091
server.error.include-stacktrace=ON_PARAM

spring.datasource.username=${pgUser}
spring.datasource.password=${pgPassword}
spring.datasource.url=${bdd}
#spring.datasource.username=dev
#spring.datasource.password=12345678
#spring.datasource.url=jdbc:postgresql://localhost:5432/websocial_dpa

spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.platform=dpa_dev

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.servlet.multipart.max-file-size=1GB
spring.servlet.multipart.max-request-size=1GB
spring.servlet.multipart.enabled=true
server.tomcat.max-swallow-size=1GB
server.tomcat.max-http-form-post-size=1GB
server.tomcat.max-http-post-size=1GB

security.jwt.expiration-time=10800000

# File Storage Configuration
file.storage.document-upload-dir=${user.dir}/storage/institution/posts/documents/
file.storage.image-upload-dir=${user.dir}/storage/institution/posts/photos/
file.storage.video-upload-dir=${user.dir}/storage/institution/posts/videos/
file.storage.user-profile-upload-dir=${user.dir}/storage/users/photos/
file.storage.max-file-size=52428800
file.storage.max-request-size=104857600
file.storage.allowed-document-types=application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document
file.storage.allowed-image-types=image/jpeg,image/png,image/gif,image/webp
file.storage.allowed-video-types=video/mp4,video/avi,video/mov,video/wmv

# Application URL Configuration (Environment Specific)
app.base-url=${BASE_URL:http://localhost:90989}
app.use-relative-urls=${USE_RELATIVE_URLS:false}
app.api.base-path=${API_BASE_PATH:/api/v1}
app.api.documents-path=${API_DOCUMENTS_PATH:/documents}
app.api.images-path=${API_IMAGES_PATH:/images}
app.api.videos-path=${API_VIDEOS_PATH:/videos}
security.jwt.refresh-expiration-time=259200000

logging.level.org.zalando.logbook.Logbook=TRACE
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate=ERROR

logbook.masking.enabled=true
logbook.obfuscate.headers=Authorization
logbook.obfuscate.parameters=password
logbook.obfuscate.body.patterns='"password": ".*"'
logbook.format.style=http
logbook.filter.enabled=true

logging.file=/logs/websocial.log

#format log file
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n

